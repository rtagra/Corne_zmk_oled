# ── Connectivity ─────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# TX power: PLUS_4 for desk range; use 0 to save more battery
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Don't erase bonds on boot (set y only when debugging pairing)
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# ── Power management ─────────────────────────────────────
CONFIG_ZMK_SLEEP=y
# 1 minute to idle (dims display, BLE low-power)
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

# ── Studio ───────────────────────────────────────────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Display (OLED) ───────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ── Mouse / Pointing ─────────────────────────────────────
CONFIG_ZMK_POINTING=y

# Stability
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=5

# Optional tuning
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

