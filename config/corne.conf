# ── Connectivity ─────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# CHANGE THIS: Lower TX Power for stability (Prevents voltage sag)
# Options: PLUS_8, PLUS_4, PLUS_2, 0, MINUS_4, MINUS_8
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y 

# ADD THESE: Force stable connection intervals (Prevents timeout flickering)
CONFIG_BT_PERIPHERAL_PREF_MIN=6      # 7.5ms * 6 = 45ms (Fast enough for typing)
CONFIG_BT_PERIPHERAL_PREF_MAX=24     # 1.25ms * 24 = 30ms (Keeps link alive)
CONFIG_BT_PERIPHERAL_LATENCY=0       # No latency skipping for stability
CONFIG_BT_PERIPHERAL_TIMEOUT=500     # Timeout supervision

# Keep this as is
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# ── Studio ───────────────────────────────────────────────
# Optional: Disable Studio temporarily to test stability if issues persist
CONFIG_ZMK_STUDIO=y 
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Display (OLED) ───────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_BATTERY_REPORTING=y

# ── Mouse / Pointing ─────────────────────────────────────
CONFIG_ZMK_POINTING=y
