# ── Connectivity ─────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# TX power: PLUS_4 for desk range; use 0 to save more battery
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# Don't erase bonds on boot (set y only when debugging pairing)
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# ── Power management ─────────────────────────────────────
CONFIG_ZMK_SLEEP=y
# 1 minute to idle (dims display, BLE low-power)
CONFIG_ZMK_IDLE_TIMEOUT=60000
# 15 minutes to deep sleep
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Studio ───────────────────────────────────────────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Display (OLED) ───────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ── Mouse / Pointing ─────────────────────────────────────
CONFIG_ZMK_POINTING=y
