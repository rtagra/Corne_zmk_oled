# ── Connectivity ─────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# ── Studio ───────────────────────────────────────────────
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# ── Display (OLED) ───────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ── Battery ──────────────────────────────────────────────

CONFIG_ZMK_BATTERY_REPORTING=y
# Report right half's battery to host (not OLED — host only)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# OPTION A — built-in screen (icon only, no conflict):
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n

# OPTION B — widget system (shows percentage, pick one or the other):
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# ── Mouse / Pointing ─────────────────────────────────────
CONFIG_ZMK_POINTING=y                  # replaces deprecated CONFIG_ZMK_MOUSE=y
